apiVersion: apps/v1
kind: Deployment
metadata:
  name: __APP_NAME__
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: __APP_NAME__
  template:
    metadata:
      labels:
        app.kubernetes.io/name: __APP_NAME__
    spec:
      containers:
        - name: app
          image: app
          # Floating tag (e.g. :main from Kustomize images:); kubelet
          # would otherwise reuse the cached layer when the tag's
          # digest changes. Phase 5 introduces Image Updater which
          # bumps the tag to a semver, at which point Always becomes
          # IfNotPresent again.
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
          readinessProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: 10
